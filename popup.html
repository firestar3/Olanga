<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; width: 260px; background: #0e0e10; color: #d4d4d8; font-size: 12px; }
  .header { padding: 12px 14px; border-bottom: 1px solid #232326; display: flex; align-items: center; gap: 8px; }
  .logo { font-size: 13px; font-weight: 500; color: #e8e8e8; }
  .ver { font-size: 10px; color: #505055; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a3a3e; flex-shrink: 0; margin-left: auto; transition: background .3s; }
  .dot.live { background: #4ade80; }
  .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .tab-info { background: #111113; border: 1px solid #232326; border-radius: 6px; padding: 8px 10px; font-size: 11px; color: #71717a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button { font-family: inherit; font-size: 11px; padding: 7px 12px; border-radius: 6px; border: 1px solid #2e2e32; cursor: pointer; transition: all .12s; background: transparent; color: #d4d4d8; width: 100%; text-align: center; }
  button:hover { background: #1c1c1f; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .primary { background: #e8e8e8; color: #0e0e10; border-color: #e8e8e8; font-weight: 500; }
  .primary:hover { background: #fff; }
  .status { font-size: 11px; color: #71717a; text-align: center; padding: 2px 0; min-height: 18px; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  .status.busy { color: #fb923c; }
</style>
</head>
<body>
<div class="header">
  <span class="logo">Olanga Bridge</span>
  <span class="ver">v0.11.3</span>
  <div class="dot" id="dot"></div>
</div>
<div class="body">
  <div class="tab-info" id="tab-url">Detecting tab…</div>
  <button class="primary" id="inject-btn">Activate on this tab</button>
  <div class="status" id="status">Ready</div>
  <button id="open-btn">Open Olanga ↗</button>
</div>
<script src="popup.js"></script>
</body>
</html>
